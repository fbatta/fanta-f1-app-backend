spring:
  application:
    name: fanta-f1-app-backend

logging:
  level:
    root: info
    "net.battaglini.fantaf1appbackend.controller": debug

jolpica:
  base-url: https://api.jolpi.ca/ergast/f1/

open-f1:
  base-url: https://api.openf1.org
  api-version: v1

firebase:
  app-name: fantaf1
  database-id: (default)
  storage-bucket: fantaf1-beitz25.firebasestorage.app
  project-id: fantaf1-beitz25
  credentials-path: /credentials/serviceAccount.json
  firestore:
    pagination:
      query-limit: 100

google:
  genai:
    chat-model: 'gemini-flash-latest'
    default-output-tokens: 200
    image-model: 'imagen-3.0-generate-002'
    api-key: ${GOOGLE_GENAI_API_KEY}

management:
  influx:
    metrics:
      export:
        enabled: false
seeding:
  drivers: false
  race-weekends: false

results-calculator:
  enable: true
  dry-run: false