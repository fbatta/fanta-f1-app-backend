info:
  name: Update drivers summaries
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/admin/drivers/summaries"
  body:
    type: json
    data: |-
      {
        "acronyms": [
          "VER",
          "HAD",
          "LEC",
          "HAM",
          "RUS",
          "ANT",
          "PIA",
          "NOR",
          "GAS",
          "COL",
          "HUL",
          "BOR",
          "PER",
          "BOT",
          "LIN",
          "LAW",
          "OCO",
          "BEA",
          "ALO",
          "STR",
          "SAI",
          "ALB"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
